name: Run HR Bot

on:
  workflow_dispatch:
  schedule:
  - cron: '0 15 * * *'   # 11:00 AM EST
  - cron: '0 19 * * *'   # 3:00 PM EST
  
jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install packages
        run: pip install pandas requests mlb-statsapi

      - name: Run bot
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python run.py
